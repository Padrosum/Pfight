<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PFight</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
    }

    #game-container {
      position: relative;
      /* Pixel-perfect scaling */
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #game-container canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* CRT scanline overlay */
    #game-container::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.08) 2px,
        rgba(0, 0, 0, 0.08) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    /* Health bars */
    #hud {
      position: absolute;
      top: 12px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 0 16px;
    }

    .player-hud {
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 38%;
    }

    .player-hud.p2 {
      align-items: flex-end;
    }

    .player-name {
      font-size: 7px;
      color: #fff;
      text-shadow: 2px 2px #000;
      letter-spacing: 1px;
    }

    .health-bar-outer {
      width: 100%;
      height: 14px;
      background: #111;
      border: 2px solid #555;
      position: relative;
    }

    .health-bar-inner {
      height: 100%;
      background: linear-gradient(to bottom, #ff4444, #cc0000);
      transition: width 0.1s ease;
      position: relative;
    }

    .health-bar-inner::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      right: 2px;
      height: 3px;
      background: rgba(255,255,255,0.3);
    }

    .p2 .health-bar-inner {
      float: right;
    }

    /* Round dots */
    .round-dots {
      display: flex;
      gap: 4px;
    }

    .p2 .round-dots {
      flex-direction: row-reverse;
    }

    .round-dot {
      width: 8px;
      height: 8px;
      border: 2px solid #888;
      background: transparent;
    }

    .round-dot.filled {
      background: #ffdd00;
      border-color: #ffaa00;
      box-shadow: 0 0 4px #ffaa00;
    }

    /* Center HUD - timer & round */
    #center-hud {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    #round-text {
      font-size: 7px;
      color: #ffdd00;
      text-shadow: 1px 1px #000;
    }

    #timer {
      font-size: 20px;
      color: #fff;
      text-shadow: 2px 2px #000;
      min-width: 48px;
      text-align: center;
    }

    #timer.urgent {
      color: #ff4444;
      animation: blink 0.5s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0.4; }
    }

    /* Combo counter */
    #combo-display {
      position: absolute;
      bottom: 60px;
      font-size: 14px;
      color: #ffdd00;
      text-shadow: 2px 2px #000, 0 0 8px #ff8800;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    #combo-display.visible {
      opacity: 1;
    }

    #combo-p1 { left: 40px; }
    #combo-p2 { right: 40px; text-align: right; }

    /* Overlay screens */
    .screen-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(0,0,0,0.75);
      pointer-events: all;
    }

    .screen-overlay.hidden { display: none; }

    .overlay-title {
      font-size: 24px;
      color: #ffdd00;
      text-shadow: 3px 3px #000, 0 0 16px #ff8800;
      text-align: center;
      line-height: 1.6;
    }

    .overlay-subtitle {
      font-size: 9px;
      color: #aaa;
      text-shadow: 1px 1px #000;
      animation: blink 1s step-end infinite;
    }

    .round-announce {
      font-size: 32px;
      color: #fff;
      text-shadow: 3px 3px #000;
    }

    /* Pause */
    #pause-screen .overlay-title {
      font-size: 20px;
    }

    /* FPS counter */
    #fps {
      position: absolute;
      bottom: 4px;
      right: 8px;
      font-size: 6px;
      color: #444;
      pointer-events: none;
    }

    /* ── Main Menu ── */
    .menu-title {
      font-size: 48px;
      color: #ffdd00;
      text-shadow: 4px 4px #000, 0 0 24px #ff8800, 0 0 48px #ff4400;
      letter-spacing: 8px;
      animation: menuPulse 2s ease-in-out infinite;
    }

    @keyframes menuPulse {
      0%, 100% { text-shadow: 4px 4px #000, 0 0 24px #ff8800, 0 0 48px #ff4400; }
      50%       { text-shadow: 4px 4px #000, 0 0 48px #ff8800, 0 0 80px #ffdd00; }
    }

    .menu-subtitle {
      font-size: 9px;
      color: #aa44ff;
      letter-spacing: 4px;
      margin-bottom: 8px;
      text-shadow: 0 0 8px #aa44ff;
    }

    .menu-controls {
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid #333;
      border-top-color: #555;
      padding: 14px 28px;
      margin-bottom: 8px;
    }

    .controls-title {
      font-size: 7px;
      color: #666;
      text-align: center;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px 28px;
      font-size: 7px;
    }

    .controls-grid span:nth-child(odd)  { color: #ffdd00; text-align: right; }
    .controls-grid span:nth-child(even) { color: #cccccc; }

    .menu-footer {
      font-size: 6px;
      color: #444;
      letter-spacing: 3px;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="ui-overlay">
      <!-- HUD -->
      <div id="hud">
        <div class="player-hud p1" id="p1-hud">
          <div class="player-name">P1</div>
          <div class="health-bar-outer">
            <div class="health-bar-inner" id="p1-health-bar" style="width:100%"></div>
          </div>
          <div class="round-dots" id="p1-rounds">
            <div class="round-dot" id="p1-r1"></div>
            <div class="round-dot" id="p1-r2"></div>
          </div>
        </div>

        <div id="center-hud">
          <div id="round-text">ROUND 1</div>
          <div id="timer">99</div>
        </div>

        <div class="player-hud p2" id="p2-hud">
          <div class="player-name">CPU</div>
          <div class="health-bar-outer">
            <div class="health-bar-inner" id="p2-health-bar" style="width:100%"></div>
          </div>
          <div class="round-dots" id="p2-rounds">
            <div class="round-dot" id="p2-r1"></div>
            <div class="round-dot" id="p2-r2"></div>
          </div>
        </div>
      </div>

      <!-- Combo displays -->
      <div id="combo-p1" class="combo-display"></div>
      <div id="combo-p2" class="combo-display"></div>

      <!-- Main menu (visible at start) -->
      <div id="main-menu" class="screen-overlay">
        <div class="menu-title">PFIGHT</div>
        <div class="menu-subtitle">2D RETRO FIGHTER</div>
        <div class="menu-controls">
          <div class="controls-title">── CONTROLS ──</div>
          <div class="controls-grid">
            <span>A / D</span><span>Walk</span>
            <span>W</span><span>Jump</span>
            <span>S</span><span>Crouch</span>
            <span>J</span><span>Light Attack</span>
            <span>K</span><span>Heavy Attack</span>
            <span>L</span><span>Block</span>
            <span>J → K</span><span>Combo</span>
            <span>P</span><span>Pause</span>
          </div>
        </div>
        <div class="overlay-subtitle">PRESS ENTER TO START</div>
        <div class="menu-footer">VS CPU &nbsp;•&nbsp; BEST OF 3 &nbsp;•&nbsp; 99 SEC</div>
      </div>

      <!-- Round announce screen -->
      <div id="announce-screen" class="screen-overlay hidden">
        <div class="round-announce" id="announce-text">ROUND 1</div>
        <div class="overlay-subtitle" id="announce-sub">FIGHT!</div>
      </div>

      <!-- Pause screen -->
      <div id="pause-screen" class="screen-overlay hidden">
        <div class="overlay-title">PAUSED</div>
        <div class="overlay-subtitle">PRESS P TO RESUME</div>
      </div>

      <!-- Win screen -->
      <div id="win-screen" class="screen-overlay hidden">
        <div class="overlay-title" id="win-text">PLAYER 1 WINS!</div>
        <div class="overlay-subtitle">PRESS ENTER TO RESTART</div>
      </div>

      <div id="fps">FPS: --</div>
    </div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
